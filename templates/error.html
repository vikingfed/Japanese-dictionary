<!DOCTYPE html>
<html>
<head>
    <title>Ошибка</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .error-container { background: #fff3f3; border: 1px solid #ffcccc; border-radius: 10px; padding: 30px; text-align: center; }
        .error-icon { font-size: 48px; margin-bottom: 20px; }
        .error-message { color: #d32f2f; font-size: 18px; margin: 20px 0; line-height: 1.5; }
        .back-button { margin-top: 20px; }
        button { padding: 12px 24px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">❌</div>
        <h2>Произошла ошибка</h2>
        <div class="error-message">{{ error_message }}</div>

        <div class="back-button">
            <a href="{{ back_url }}">
                <button>← Вернуться назад</button>
            </a>
        </div>

        <div style="margin-top: 20px;">
            <a href="/">На главную страницу</a>
        </div>
    </div>
</body>
</html>
