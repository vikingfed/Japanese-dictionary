<!DOCTYPE html>
<html>
<head>
    <title>Добавить вариант использования</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .back { margin-bottom: 20px; }
        input { padding: 10px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 12px 20px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        button.secondary { background: #6c757d; }
        .required { color: red; }
        .note { font-size: 14px; color: #666; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="back">
        <a href="/"><button class="secondary">← Назад</button></a>
    </div>

    <h2>📝 Добавить вариант использования</h2>
    <div class="note">Добавь новый вариант использования к существующему иероглифу</div>

    <form action="/add-usage" method="post">
        <div>
            <label>Иероглиф <span class="required">*</span>:</label>
            <input type="text" name="hieroglyph" placeholder="" required>
            <div class="note">Введи иероглиф, к которому добавляем вариант</div>
        </div>

        <div>
            <label>Вариант использования <span class="required">*</span>:</label>
            <input type="text" name="usage" placeholder="" required>
        </div>

        <div>
            <label>Чтение <span class="required">*</span>:</label>
            <input type="text" name="reading" placeholder="" required>
        </div>

        <div>
            <label>Перевод <span class="required">*</span>:</label>
            <input type="text" name="translation" placeholder="" required>
        </div>

        <button type="submit">💾 Добавить вариант</button>
    </form>
</body>
</html>
